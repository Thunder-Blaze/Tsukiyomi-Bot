services:
  - type: web
    name: tsukiyomi-bot
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: tsukiyomi-redis
          property: connectionString
      - key: PORT
        value: "10000"
      - key: DB_MAX_CONNECTIONS
        value: "20"
      - key: DB_MIN_CONNECTIONS
        value: "5"
      - key: REDIS_POOL_MAX_OPEN
        value: "16"
      - key: REDIS_POOL_MAX_IDLE
        value: "8"
      - key: RUST_LOG
        value: info
      - key: RUST_BACKTRACE
        value: "1"

    healthCheckPath: /health
    healthCheckTimeout: 100
    
  - type: redis
    name: tsukiyomi-redis
    plan: free
    maxmemoryPolicy: allkeys-lru